<?xml version='1.0'?>
<fontconfig>
    <alias binding="same">
        <family>sans-serif</family>
        <prefer>
            <!-- {% print_array(data.fontconfig.sans_serif, |i, v| `${repeat(TABSTOP, 3)}<family>${v}</family>${"\n"}`) %} -->
            <family>Noto Sans</family>
            <!-- {% end %} -->
        </prefer>
    </alias>
    <alias binding="same">
        <family>serif</family>
        <prefer>
            <!-- {% print_array(data.fontconfig.serif, |i, v| `${repeat(TABSTOP, 3)}<family>${v}</family>${"\n"}`) %} -->
            <family>Noto Serif</family>
            <!-- {% end %} -->
        </prefer>
    </alias>
    <alias binding="same">
        <family>monospace</family>
        <prefer>
            <!-- {% print_array(data.fontconfig.monospace, |i, v| `${repeat(TABSTOP, 3)}<family>${v}</family>${"\n"}`) %} -->
            <family>0xProto Nerd Font</family>
            <family>Noto Sans Mono</family>
            <!-- {% end %} -->
        </prefer>
    </alias>
    <alias binding="same">
        <family>emoji</family>
        <prefer>
            <!-- {% print_array(data.fontconfig.emoji, |i, v| `${repeat(TABSTOP, 3)}<family>${v}</family>${"\n"}`) %} -->
            <family>Noto Color Emoji</family>
            <!-- {% end %} -->
        </prefer>
    </alias>
</fontconfig>
