PATH="$HOME/.local/bin:$PATH"

XDG_CONFIG_HOME="$HOME/.config"
XDG_CACHE_HOME="$HOME/.cache"
XDG_DATA_HOME="$HOME/.local/share"
XDG_STATE_HOME="$HOME/.local/state"

# {% print_map(data.xdg_user_dirs, |k, v| `XDG_${k.to_upper()}_DIR="$HOME/${v}"${"\n"}`) %}
XDG_DESKTOP_DIR="$HOME/documents"
XDG_DOCUMENTS_DIR="$HOME/documents"
XDG_DOWNLOAD_DIR="$HOME/downloads"
XDG_MUSIC_DIR="$HOME/music"
XDG_PICTURES_DIR="$HOME/pictures"
XDG_PROJECTS_DIR="$HOME/projects"
XDG_PUBLICSHARE_DIR="$HOME/documents"
XDG_TEMPLATES_DIR="$HOME/documents"
XDG_VIDEOS_DIR="$HOME/videos"
# {% end %}

FZF_DEFAULT_OPTS='--border --highlight-line'

# {# replace_quoted(data.default_apps.editor.exe) #}
EDITOR="nvim"
# {# replace_quoted(data.default_apps.editor.exe) #}
VISUAL="nvim"
PAGER=less
# {% if data.default_apps.editor.exe == "nvim" %}
MANPAGER='nvim +Man!'
# {% end %}

# {% if data.default_apps.ime == "fcitx5" %}
