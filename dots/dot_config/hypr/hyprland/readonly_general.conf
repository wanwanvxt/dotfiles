monitor = , preferred, auto, 1

general {
    border_size = 2
    gaps_in = 4
    gaps_out = 8

    col.inactive_border = rgb(808080)
    col.active_border = rgb(00ff99)

    layout = scrolling
    resize_on_border = true
    extend_border_grab_area = 10
    allow_tearing = true
}

decoration {
    rounding = 4
    rounding_power = 2

    dim_modal = true
    dim_special = 0.4
    dim_around = 0.2

    blur {
        enabled = true
        size = 8
        passes = 2
        xray = true
    }

    shadow {
        enabled = true
        range = 8
        render_power = 4
        color = rgb(000000)
        color_inactive = rgb(000000)
    }
}

animations {
    enabled = true
    # curves
    bezier = decel, 0.05, 0.7, 0.1, 1
    bezier = accel, 0.3, 0, 0.8, 0.1
    bezier = menuDecel, 0.1, 1, 0, 1
    bezier = menuAccel, 0.5, 0.03, 0.7, 0.08
    bezier = fast, 0, 0, 0, 1
    ## windows
    animation = windowsIn,   1, 3, decel, popin 80%
    animation = windowsOut,  1, 2, accel, popin 90%
    animation = windowsMove, 1, 3, decel, slide
    animation = border,      1, 3, decel
    animation = fadeIn,      1, 3, decel
    animation = fadeOut,     1, 2, accel
    ## workspaces
    animation = workspaces,          1, 5, menuDecel, slidevert
    animation = specialWorkspaceIn,  1, 3, menuDecel, slidevert
    animation = specialWorkspaceOut, 1, 2, menuAccel, slidevert
    ## layers
    animation = layersIn,      1, 3, decel, popin 80%
    animation = layersOut,     1, 2, accel, popin 90%
    animation = fadeLayersIn,  1, 3, decel
    animation = fadeLayersOut, 1, 2, accel
    ## zoom
    animation = zoomFactor, 1, 3, fast
}

input {
    kb_layout = us
    numlock_by_default = true
    repeat_rate = 25
    repeat_delay = 250

    sensitivity = 0
    accel_profile = flat

    follow_mouse = true
    follow_mouse_threshold = 10
    off_window_axis_events = 2

    touchpad {
        natural_scroll = true
        scroll_factor = 1.5
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    disable_autoreload = true
    focus_on_activate = true
    allow_session_lock_restore = true
    session_lock_xray = true
    background_color = rgb(000000)
    close_special_on_empty = true
    on_focus_under_fullscreen = 2
}

scrolling {
    fullscreen_on_one_column = false
    column_width = 0.667
    focus_fit_method = 1
    follow_min_visible = 0.8
    explicit_column_widths = 0.333, 0.5, 0.667, 1
}

binds {
    scroll_event_delay = 0
    hide_special_on_workspace_change = true
    workspace_center_on = 1
}

xwayland {
    enabled = true
    force_zero_scaling = true
}

cursor {
    zoom_rigid = true
}
