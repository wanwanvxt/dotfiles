[xdgUserDirs]
XDG_DESKTOP_DIR     = "$HOME/documents"
XDG_TEMPLATES_DIR   = "$HOME/documents"
XDG_PUBLICSHARE_DIR = "$HOME/documents"
XDG_DOCUMENTS_DIR   = "$HOME/documents"
XDG_DOWNLOAD_DIR    = "$HOME/downloads"
XDG_MUSIC_DIR       = "$HOME/music"
XDG_PICTURES_DIR    = "$HOME/pictures"
XDG_VIDEOS_DIR      = "$HOME/videos"
XDG_PROJECTS_DIR    = "$HOME/projects"

[uwsm]
defaultId = "niri.desktop"

[defaultApps]
terminal    = { exe = "kitty",   desktop = "kitty.desktop" }
browser     = { exe = "firefox", desktop = "firefox.desktop" }
fileManager = { exe = "thunar",  desktop = "thunar.desktop" }
editor      = { exe = "nvim",    desktop = "nvim.desktop" }
image       = { exe = "imv",     desktop = "imv.desktop" }
video       = { exe = "mpv",     desktop = "mpv.desktop" }
music       = { exe = "mpv",     desktop = "mpv.desktop" }
ime         = { exe = "fcitx5" }
pager       = { exe = "less" }
manpager    = { exe = "nvim +Man!" }

[appearance]
isLightTheme  = false
iconTheme     = "Papirus-Light"
iconThemeDark = "Papirus-Dark"

[appearance.xcursor]
name = "Bibata-Modern-Ice"
size = 24

[appearance.fontconfig]
sansSerif = [ "Noto Sans" ]
serif     = [ "Noto Serif" ]
monospace = [ "0xProto Nerd Font", "Noto Sans Mono" ]
emoji     = [ "Noto Color Emoji" ]
size      = 12

[appearance.gtk]
theme         = "adw-gtk3" # sync with GTK4
themeDark     = "adw-gtk3-dark"

[appearance.qt]
platformTheme = "qt6ct"
